services:
  ergo:
    image: ghcr.io/ergochat/ergo:stable
    container_name: smalltalk-ergo
    restart: unless-stopped
    ports:
      - "127.0.0.1:6667:6667"
      - "127.0.0.1:6697:6697"
      - "127.0.0.1:8097:8097"
      - "127.0.0.1:8098:8098"
    volumes:
      - ./config/ergo:/ircd
    networks:
      - smalltalk

  thelounge:
    image: thelounge/thelounge:latest
    container_name: smalltalk-thelounge
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./data/thelounge:/var/opt/thelounge
      # Preact frontend — replace The Lounge's default Vue frontend
      - /workspace/projects/smalltalk-webclient/client-new/dist:/usr/local/share/.config/yarn/global/node_modules/thelounge/public:ro
      - /workspace/projects/smalltalk-channel/config/thelounge-overlay/client/index.html.tpl:/usr/local/share/.config/yarn/global/node_modules/thelounge/client/index.html.tpl:ro
    depends_on:
      - ergo
    networks:
      - smalltalk

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smalltalk-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./config/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    networks:
      - smalltalk
    depends_on:
      - thelounge

  # caddy is kept here for reference if you have a real public IP and prefer
  # to self-manage TLS instead of using Cloudflare Tunnel.
  #
  # caddy:
  #   image: caddy:alpine
  #   container_name: smalltalk-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile
  #     - ./data/caddy:/data
  #   depends_on:
  #     - thelounge
  #   networks:
  #     - smalltalk

networks:
  smalltalk:
    driver: bridge
