services:
  ergo:
    image: ghcr.io/ergochat/ergo:stable
    container_name: smalltalk-ergo
    restart: unless-stopped
    ports:
      - "127.0.0.1:6667:6667"
      - "127.0.0.1:6697:6697"
      - "127.0.0.1:8097:8097"
      - "127.0.0.1:8098:8098"
    volumes:
      - ./config/ergo:/ircd
    networks:
      - smalltalk

  nginx:
    image: nginx:alpine
    container_name: smalltalk-nginx
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./config/nginx/chat.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - thelounge
    networks:
      - smalltalk

  thelounge:
    image: thelounge/thelounge:latest
    container_name: smalltalk-thelounge
    restart: unless-stopped
    ports: []
    volumes:
      - ./data/thelounge:/var/opt/thelounge
      # Custom Smalltalk theme + HTML template + logos
      - ./config/thelounge-themes:/usr/local/share/.config/yarn/global/node_modules/thelounge/public/themes
      - ./config/thelounge-overlay/client/index.html.tpl:/usr/local/share/.config/yarn/global/node_modules/thelounge/client/index.html.tpl:ro
      - ./config/thelounge-img/logo-vertical-transparent-bg.svg:/usr/local/share/.config/yarn/global/node_modules/thelounge/public/img/logo-vertical-transparent-bg.svg:ro
      - ./config/thelounge-img/logo-vertical-transparent-bg-inverted.svg:/usr/local/share/.config/yarn/global/node_modules/thelounge/public/img/logo-vertical-transparent-bg-inverted.svg:ro
      - ./config/thelounge-img/smalltalk-logo.png:/usr/local/share/.config/yarn/global/node_modules/thelounge/public/img/smalltalk-logo.png:ro
      - ./config/thelounge-img/favicon.ico:/usr/local/share/.config/yarn/global/node_modules/thelounge/public/favicon.ico:ro
    depends_on:
      - ergo
    networks:
      - smalltalk

  # cloudflared exposes The Lounge publicly via Cloudflare Tunnel — no inbound ports needed.
  # Uncomment and set CLOUDFLARE_TUNNEL_TOKEN in .env to enable.
  # See docs/SETUP.md for step-by-step Cloudflare Tunnel setup.
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: smalltalk-cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - thelounge
  #   networks:
  #     - smalltalk

  # caddy — alternative to Cloudflare Tunnel if you have a real public IP.
  # Handles TLS automatically via Let's Encrypt.
  #
  # caddy:
  #   image: caddy:alpine
  #   container_name: smalltalk-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile
  #     - ./data/caddy:/data
  #   depends_on:
  #     - thelounge
  #   networks:
  #     - smalltalk

networks:
  smalltalk:
    driver: bridge
