services:
  ergo:
    image: ghcr.io/ergochat/ergo:stable
    container_name: smalltalk-ergo
    restart: unless-stopped
    ports:
      - "127.0.0.1:6667:6667"
      - "127.0.0.1:6697:6697"
      - "127.0.0.1:8097:8097"
      - "127.0.0.1:8098:8098"
    volumes:
      - ./config/ergo:/ircd
    networks:
      - smalltalk

  thelounge:
    image: thelounge/thelounge:latest
    container_name: smalltalk-thelounge
    restart: unless-stopped
    extra_hosts:
      - "hanza.smalltalk.chat:10.120.144.14"
      - "clinic.smalltalk.chat:10.120.144.14"
      - "irc.smalltalk.chat:10.120.144.14"
    ports:
      - "9000:9000"
    volumes:
      - ./data/thelounge:/var/opt/thelounge
      # Custom Smalltalk theme + HTML template + logos
      - ./config/thelounge-themes:/usr/local/share/.config/yarn/global/node_modules/thelounge/public/themes
      - ./config/thelounge-overlay/client/index.html.tpl:/usr/local/share/.config/yarn/global/node_modules/thelounge/client/index.html.tpl:ro
      - ./config/thelounge-img/logo-vertical-transparent-bg.svg:/usr/local/share/.config/yarn/global/node_modules/thelounge/public/img/logo-vertical-transparent-bg.svg:ro
      - ./config/thelounge-img/logo-vertical-transparent-bg-inverted.svg:/usr/local/share/.config/yarn/global/node_modules/thelounge/public/img/logo-vertical-transparent-bg-inverted.svg:ro
      - ./config/thelounge-img/smalltalk-logo.png:/usr/local/share/.config/yarn/global/node_modules/thelounge/public/img/smalltalk-logo.png:ro
    depends_on:
      - ergo
    networks:
      - smalltalk

  provision:
    image: oven/bun:latest
    container_name: smalltalk-provision
    restart: unless-stopped
    working_dir: /app
    command: sh -c "apt-get update -qq && apt-get install -y --no-install-recommends openssl 2>/dev/null; bun run src/server.ts"
    environment:
      - PORT=3000
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - CF_ZONE_ID=${CF_ZONE_ID:-28480223da457af4601a72c0cdb0a83a}
      - MAX_FREE_SERVERS=${MAX_FREE_SERVERS:-20}
      - HOST_APP_DIR=/workspace/projects/smalltalk-provision
    volumes:
      - /workspace/projects/smalltalk-provision:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    networks:
      - smalltalk

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smalltalk-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml --no-autoupdate --protocol http2 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./config/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    networks:
      - smalltalk
    depends_on:
      - thelounge

  # caddy is kept here for reference if you have a real public IP and prefer
  # to self-manage TLS instead of using Cloudflare Tunnel.
  #
  # caddy:
  #   image: caddy:alpine
  #   container_name: smalltalk-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile
  #     - ./data/caddy:/data
  #   depends_on:
  #     - thelounge
  #   networks:
  #     - smalltalk

networks:
  smalltalk:
    driver: bridge
